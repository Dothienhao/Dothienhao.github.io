`<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài Xỉu - Dice Game</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(0,0,0,0.4);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      margin-bottom: 10px;
      color: #ffd700;
    }
    .dice-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }
    .die {
      width: 80px;
      height: 80px;
      background: white;
      color: black;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.6);
      transition: all 0.3s;
    }
    .result {
      font-size: 28px;
      margin: 20px 0;
      font-weight: bold;
    }
    .tai { color: #00ff00; }
    .xiu { color: #ff4444; }

    button {
      padding: 12px 30px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }
    .roll-btn {
      background: #ffd700;
      color: black;
      font-weight: bold;
    }
    .roll-btn:hover {
      transform: scale(1.05);
    }

    .history {
      margin-top: 30px;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }
    .bet-area {
      margin: 25px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 TÀI XỈU</h1>
    <p style="margin-bottom:20px;">Cược vui - Chơi giải trí</p>

    <!-- Số dư -->
    <div style="margin:15px 0; font-size:20px;">
      Số dư: <strong id="balance">500000</strong> VNĐ
    </div>

    <!-- Dice -->
    <div class="dice-container" id="dice">
      <div class="die" id="die1">⚀</div>
      <div class="die" id="die2">⚀</div>
      <div class="die" id="die3">⚀</div>
    </div>

    <!-- Kết quả -->
    <div class="result" id="result">Nhấn "Lắc Xúc Xắc" để bắt đầu</div>

    <!-- Nút lắc -->
    <button class="roll-btn" onclick="rollDice()">🎲 LẮC XÚC XẮC</button>

    <!-- Cược -->
    <div class="bet-area">
      <button onclick="placeBet('tai')" style="background:#00cc00; color:white;">TÀI (11-17)</button>
      <button onclick="placeBet('xiu')" style="background:#ff3333; color:white;">XỈU (4-10)</button>
    </div>

    <div id="bet-status" style="margin:10px; min-height:24px;"></div>

    <!-- Lịch sử -->
    <div class="history">
      <h3>Lịch sử quay:</h3>
      <div id="history"></div>
    </div>
  </div>

  <script>
    let balance = 500000;
    let currentBet = 0;
    let betType = null;
    const historyList = [];

    const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

    function getRandomDie() {
      return Math.floor(Math.random() * 6) + 1;
    }

    function rollDice() {
      const die1 = document.getElementById('die1');
      const die2 = document.getElementById('die2');
      const die3 = document.getElementById('die3');
      const resultDiv = document.getElementById('result');
      const betStatus = document.getElementById('bet-status');

      // Animation lắc
      die1.style.transform = 'rotate(360deg)';
      die2.style.transform = 'rotate(360deg)';
      die3.style.transform = 'rotate(360deg)';

      setTimeout(() => {
        const d1 = getRandomDie();
        const d2 = getRandomDie();
        const d3 = getRandomDie();
        const sum = d1 + d2 + d3;

        die1.textContent = diceFaces[d1-1];
        die2.textContent = diceFaces[d2-1];
        die3.textContent = diceFaces[d3-1];

        let resultText = `${d1} + ${d2} + ${d3} = ${sum} `;

        if (sum >= 11) {
          resultText += `<span class="tai">TÀI</span>`;
        } else {
          resultText += `<span class="xiu">XỈU</span>`;
        }

        resultDiv.innerHTML = resultText;

        // Xử lý cược
        if (currentBet > 0 && betType) {
          const isTai = sum >= 11;
          if ((betType === 'tai' && isTai) || (betType === 'xiu' && !isTai)) {
            balance += currentBet * 2;
            betStatus.innerHTML = `<span style="color:#00ff00">✅ Thắng ${currentBet.toLocaleString()}đ</span>`;
          } else {
            balance -= currentBet;
            betStatus.innerHTML = `<span style="color:#ff4444">❌ Thua ${currentBet.toLocaleString()}đ</span>`;
          }
          document.getElementById('balance').textContent = balance.toLocaleString();
          currentBet = 0;
          betType = null;
        }

        // Lưu lịch sử
        historyList.unshift(`${d1}-${d2}-${d3} = ${sum} ${sum>=11?'TÀI':'XỈU'}`);
        if (historyList.length > 10) historyList.pop();
        
        document.getElementById('history').innerHTML = historyList.join('<br>');
      }, 600);
    }

    function placeBet(type) {
      const betAmount = 50000; // Có thể thay đổi
      if (balance < betAmount) {
        alert("Không đủ tiền cược!");
        return;
      }
      currentBet = betAmount;
      betType = type;
      document.getElementById('bet-status').innerHTML = 
        `Đã cược <strong>${betAmount.toLocaleString()}đ</strong> vào <strong>${type.toUpperCase()}</strong>`;
    }
  </script>
</body>
</html>
