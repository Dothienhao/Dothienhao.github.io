<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<style>
body{background:#0a0a0a;color:#fff;text-align:center;padding:40px;font-family:Arial}
.so{font-size:120px;font-weight:700;margin:30px;color:#00ff88;text-shadow:0 0 20px #00ff88}
.btn{font-size:28px;padding:18px 60px;background:linear-gradient(45deg,#ff4444,#ff8800);border:0;border-radius:15px;color:#fff;cursor:pointer}
</style>
</head>
<body>
<h2>🎯 Quay 3 Càng 1-999</h2>
<div class="so" id="so">---</div>
<button class="btn" onclick="quay()">QUAY</button>

<script>
function quay(){
  let n = Math.floor(Math.random()*999)+1;
  document.getElementById("so").innerText = String(n).padStart(3,'0');
}
</script>
</body>
